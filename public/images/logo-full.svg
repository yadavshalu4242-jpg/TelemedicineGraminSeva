<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80">
  <defs>
    <linearGradient id="fullLogoBluGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b5f99;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d8b6f;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowFull">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25" />
    </filter>
  </defs>
  <!-- Logo mark -->
  <circle cx="40" cy="40" r="32" fill="url(#fullLogoBluGreen)" filter="url(#shadowFull)" />
  <g transform="translate(40, 40)">
    <circle cx="0" cy="-8" r="6" fill="white" />
    <path d="M -10 1 Q -10 5 -6 7 L 6 7 Q 10 5 10 1 Z" fill="white" />
  </g>
  <!-- Text: Gramin Seva -->
  <text x="90" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#1b5f99" letter-spacing="-0.5">Gramin</text>
  <text x="90" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#2d8b6f" letter-spacing="0.5">Seva</text>
</svg>